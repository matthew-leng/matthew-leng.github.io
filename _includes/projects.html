<div class="grid-item">
  {% if project.redirect %}
  <a href="{{ project.redirect }}" target="_blank">
  {% else %}
  <a href="{{ project.url | relative_url }}">
  {% endif %}
    <div class="card hoverable">
      {% if project.img %}
      <img src="{{ project.img | relative_url }}" alt="project thumbnail" style="border: 2px solid #555;">
      {% endif %}
      <div class="card-body">
        <h6 class="card-title" style="font-size: 0.9rem">{{ project.description }}</h6>
        <p class="card-text"  style="font-size: 0.7rem">{{ project.title }}, {{ project.date | date: "%b %-d, %Y" }}</p>

        <div class="row ml-1 mr-1 p-0">
          {% if project.github %}
          <div class="github-icon">
            <div class="icon" data-toggle="tooltip" title="Code Repository">
              <a href="{{ project.github }}" target="_blank"><i class="fab fa-github gh-icon"></i></a>
            </div>
            {% if project.github_stars %}
            <span class="stars" data-toggle="tooltip" title="GitHub Stars">
              <i class="fas fa-star"></i>
              <span id="{{ project.github_stars }}-stars"></span>
            </span>
            {% endif %}
          </div>
          {% endif %}
        </div>
      </div>
    </div>
  </a>
</div>
